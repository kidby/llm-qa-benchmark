# Model registry. Adding a model is one [[model]] table.
# Only `provider` affects behaviour (openrouter | local); it selects the generate
# function. `slug` is the unique key used on the CLI and in results. Models with
# skip_by_default = true are excluded from `--models all` (include them with
# `--models *` or by slug). Costs are USD per million tokens.

# --- Default set (--models all) ---------------------------------------------

[[model]]
slug = "claude-opus-4-8"
id = "anthropic/claude-opus-4.8"
provider = "openrouter"
label = "Claude Opus 4.8"
input_cost_per_mtok = 5.0
output_cost_per_mtok = 25.0

[[model]]
slug = "claude-sonnet-4-6"
id = "anthropic/claude-sonnet-4.6"
provider = "openrouter"
label = "Claude Sonnet 4.6"
input_cost_per_mtok = 3.0
output_cost_per_mtok = 15.0

[[model]]
slug = "claude-haiku-4-5"
id = "anthropic/claude-haiku-4.5"
provider = "openrouter"
label = "Claude Haiku 4.5"
input_cost_per_mtok = 1.0
output_cost_per_mtok = 5.0

