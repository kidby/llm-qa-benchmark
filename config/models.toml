# --- Local (Ollama / vLLM, OpenAI-compatible) -------------------------------
# Local is where you control quantization: Ollama serves GGUF tags such as
# `qwen2.5-coder:32b` at q4_K_M by default, or pin one like `:32b-instruct-q8_0`.

[[model]]
slug = "qwen3-32b-local"
id = "qwen3:32b"
provider = "local"
label = "Qwen3 32B (Ollama)"
context_override = 32768
params_b = 32
skip_by_default = true

[[model]]
slug = "qwen-coder-local"
id = "qwen2.5-coder:32b"
provider = "local"
label = "Qwen2.5 Coder 32B (Ollama, q4_K_M)"
